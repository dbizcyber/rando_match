<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Randonnées du club</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:Segoe UI,Arial;
background:#f4f6f8;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:25px;
}

.filters{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

input{
padding:8px;
border:1px solid #ccc;
border-radius:5px;
}

.stats{
margin-top:10px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
background:white;
font-size:13px;
}

th{
background:#2c7be5;
color:white;
padding:8px;
cursor:pointer;
}

th:hover{
background:#1a5fc4;
}

td{
padding:6px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f0f5ff;
cursor:pointer;
}

#popupCarte{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:1000;
}

.popup-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:85%;
height:50%;
background:white;
border-radius:10px;
overflow:hidden;
}

#map{
width:100%;
height:100%;
}

#fermerCarte{
position:absolute;
top:10px;
right:15px;
font-size:28px;
cursor:pointer;
z-index:2000;
}

.zoneGraph{
width:320px;
height:220px;
margin:8px auto 10px auto;
}

#graphStats{
width:100% !important;
height:100% !important;
}

</style>

</head>

<body>

<div class="container">

<h1>Randonnées du club</h1>

<div class="filters">

<div class="grid">

<input type="date" id="date">

<input type="text" id="description" placeholder="Description">

<input type="text" id="animateur" placeholder="Animateur">

<input type="number" id="ibp" placeholder="IBP max">

<input type="number" id="km" placeholder="Km max">

<input type="number" id="denivele" placeholder="Dénivelé max">

</div>
<div id="zoneStats">

<div class="stats" id="stats"></div>

<div class="zoneGraph">
<canvas id="graphStats"></canvas>
</div>

</div>
<table>

<thead>
<tr>
<th onclick="trier('date')">Date</th>
<th onclick="trier('description')">Description</th>
<th onclick="trier('ibp')">IBP</th>
<th onclick="trier('km')">Km</th>
<th onclick="trier('denivele')">Dénivelé</th>
<th onclick="trier('animateur')">Animateur</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div id="popupCarte">

<div class="popup-content">

<span id="fermerCarte">&times;</span>

<div id="map"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let colonneTri = null;
let sensTri = 1;

const SUPABASE_URL = "https://whlxbfnmyqdflmxosfse.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndobHhiZm5teXFkZmxteG9zZnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3ODA5MTksImV4cCI6MjA4ODM1NjkxOX0.vf3sdnJRnnXyIx998fhPSIUPX0WS7KqDbvAwesCzOcE";

const THUNDERFOREST_KEY="0ffff5950d8a4019bcede9aaeeecb57f";

let toutes=[];
let filtre=[];
let map;
let marker;
let radarChart;

async function charger(){

let res=await fetch(SUPABASE_URL+"/rest/v1/sorties?select=*",{

headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY
}

});

toutes = await res.json();

/* tri par date (plus récent en premier) */
toutes.sort((a,b)=> new Date(b.date) - new Date(a.date));

filtrer();
}

window.onload=charger;

document.querySelectorAll("input").forEach(i=>{

i.addEventListener("input",filtrer);

});

function trier(colonne){

if(colonneTri===colonne){
sensTri = sensTri * -1;
}else{
colonneTri = colonne;
sensTri = 1;
}

filtre.sort((a,b)=>{

let vA = a[colonne] ?? "";
let vB = b[colonne] ?? "";

if(colonne==="date"){
return (new Date(vA)-new Date(vB)) * sensTri;
}

if(!isNaN(vA) && !isNaN(vB)){
return (vA-vB) * sensTri;
}

return vA.toString().localeCompare(vB.toString()) * sensTri;

});

afficher();

}

function filtrer(){

let date=document.getElementById("date").value;
let desc=document.getElementById("description").value.toLowerCase();
let anim=document.getElementById("animateur").value.toLowerCase();
let ibp=document.getElementById("ibp").value;
let km=document.getElementById("km").value;
let den=document.getElementById("denivele").value;

filtre=toutes.filter(r=>{

return (!date || r.date===date)
&& (!desc || r.description?.toLowerCase().includes(desc))
&& (!anim || r.animateur?.toLowerCase().includes(anim))
&& (!ibp || r.ibp<=ibp)
&& (!km || r.km<=km)
&& (!den || r.denivele<=den);

});

afficher();

}

function creerGraphique(nb,km,den,ibp,nbA,kmA,denA,ibpA){

let ctx=document.getElementById("graphStats");

if(radarChart){
radarChart.destroy();
}

let scoreRandos=(nb/300)*100;
let scoreKm=(km/25)*100;
let scoreDen=(den/1200)*100;
let scoreIBP=(ibp/80)*100;

let scoreRandosA=(nbA/300)*100;
let scoreKmA=(kmA/25)*100;
let scoreDenA=(denA/1200)*100;
let scoreIBPA=(ibpA/80)*100;

let datasets=[{

label:"Club",

data:[
scoreRandos,
scoreKm,
scoreDen,
scoreIBP
],

backgroundColor:"rgba(44,123,229,0.25)",
borderColor:"#2c7be5",
borderWidth:2

}];

if(nbA>0){

datasets.push({

label:"Animateur",

data:[
scoreRandosA,
scoreKmA,
scoreDenA,
scoreIBPA
],

backgroundColor:"rgba(255,0,0,0.2)",
borderColor:"red",
pointBackgroundColor:"red"

});

}

radarChart=new Chart(ctx,{

type:"radar",

data:{
labels:[
"Activité",
"Distance",
"Dénivelé",
"Difficulté"
],

datasets:datasets

},

options:{
responsive:true,
maintainAspectRatio:false,

plugins:{
legend:{
position:"top",
labels:{
boxWidth:12,
font:{size:11}
}
}
},

scales:{
r:{
min:0,
max:100,
ticks:{display:false},
pointLabels:{
font:{size:11}
}
}
}

}

});

}

function initMap(){

map = L.map("map").setView([42.5,2.8],10);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
maxZoom:19,
attribution:"© OpenStreetMap"
}).addTo(map);

L.tileLayer(
"https://tile.thunderforest.com/outdoors/{z}/{x}/{y}.png?apikey="+THUNDERFOREST_KEY,
{
maxZoom:22,
attribution:"© Thunderforest"
}
).addTo(map);

}

function afficher(){

let tbody=document.getElementById("tableBody");
tbody.innerHTML="";

let animateur=document.getElementById("animateur").value.toLowerCase();

let totalKm=0;
let totalDen=0;
let totalIBP=0;

let totalKmA=0;
let totalDenA=0;
let totalIBPA=0;
let nbA=0;

toutes.forEach(r=>{

totalKm+=Number(r.km)||0;
totalDen+=Number(r.denivele)||0;
totalIBP+=Number(r.ibp)||0;

});

filtre.forEach(r=>{

if(animateur && r.animateur && r.animateur.toLowerCase().includes(animateur)){

totalKmA+=Number(r.km)||0;
totalDenA+=Number(r.denivele)||0;
totalIBPA+=Number(r.ibp)||0;

nbA++;

}

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${r.date?new Date(r.date).toLocaleDateString("fr-FR"):""}</td>
<td>${r.description??""}</td>
<td>${r.ibp??""}</td>
<td>${r.km??""}</td>
<td>${r.denivele??""}</td>
<td>${r.animateur??""}</td>
`;

/* MODIF : utilise r.lieu en priorité, sinon repli sur la description */
tr.onclick=()=>ouvrirCartePopup(r.lieu || r.description);

tbody.appendChild(tr);

});

let nClub=toutes.length;

let moyKm=nClub?totalKm/nClub:0;
let moyDen=nClub?totalDen/nClub:0;
let moyIBP=nClub?totalIBP/nClub:0;

let moyKmA=nbA?totalKmA/nbA:0;
let moyDenA=nbA?totalDenA/nbA:0;
let moyIBPA=nbA?totalIBPA/nbA:0;

let n=filtre.length;

document.getElementById("stats").innerHTML=
"📊 "+n+" randonnée(s) affichée(s) | Moyenne Km : "+moyKm.toFixed(1)+
" | Moyenne Dénivelé : "+moyDen.toFixed(0)+
" | Moyenne IBP : "+moyIBP.toFixed(0);

creerGraphique(
nClub,moyKm,moyDen,moyIBP,
nbA,moyKmA,moyDenA,moyIBPA
);

}

/* MODIF : reçoit directement le lieu, plus besoin de split(".") */
async function afficherCarte(lieu){

let url="https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(lieu);

let res=await fetch(url);

let data=await res.json();

if(data.length){

let lat=data[0].lat;
let lon=data[0].lon;

map.setView([lat,lon],13);

if(marker) map.removeLayer(marker);

let pointBleu = L.divIcon({
  className:'',
  html:'<div style="width:14px;height:14px;background:#2c7be5;border:2px solid white;border-radius:50%;box-shadow:0 0 4px rgba(0,0,0,0.4)"></div>',
  iconSize:[14,14],
  iconAnchor:[7,7],
  popupAnchor:[0,-10]
});

marker=L.marker([lat,lon],{icon:pointBleu}).addTo(map)
.bindPopup(lieu)
.openPopup();

}

}

function ouvrirCartePopup(lieu){

document.getElementById("popupCarte").style.display="block";

setTimeout(()=>{

if(!map){
initMap();
}else{
map.invalidateSize();
}

afficherCarte(lieu);

},300);

}

document.getElementById("fermerCarte").onclick=function(){

document.getElementById("popupCarte").style.display="none";

}
</script>

</body>

</html>
